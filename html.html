<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Memory Match</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🧠 Emoji Memory Match</h1>

<div class="stats">
  <div>Moves: <span id="move-count">0</span></div>
  <div>Time: <span id="timer">0s</span></div>
</div>

<div class="best-stats" id="best-stats">Best: -- moves, --s</div>

<button id="new-game-btn">New Game</button>

<div id="board"></div>

<div id="win-message">
  <h2>🎉 You Win!</h2>
  <p id="win-summary"></p>
</div>

<script src="script.js"></script>
</body>
</html>
